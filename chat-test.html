<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Realtime Chat Test</title>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5
    }

    input,
    button {
      padding: 6px;
      margin: 4px 0
    }

    #chat {
      height: 350px;
      background: #fff;
      border: 1px solid #ccc;
      overflow: auto;
      padding: 10px
    }

    .me {
      color: green
    }

    .other {
      color: blue
    }

    .system {
      color: gray;
      font-size: 13px
    }

    .tick.grey {
      color: gray
    }

    .tick.blue {
      color: #1e88e5;
      font-weight: bold
    }
  </style>
</head>

<body>

  <h2>🧪 Chat Tester (User / Admin)</h2>

  JWT Token<br>
  <input id="token" size="80"><br>

  My ID (User/Admin)<br>
  <input id="myId"><br>

  Receiver ID<br>
  <input id="otherId"><br>

  Receiver Model<br>
  <select id="receiverModel">
    <option value="User">User</option>
    <option value="Admin">Admin</option>
  </select>

  <br>

  <button onclick="connectSocket()">🔌 Connect Socket</button>

  <hr>

  <button onclick="createConversation()">💬 Create / Get Conversation</button>

  <p><b>Conversation ID:</b> <span id="conversationId">—</span></p>

  <hr>

  <input id="message" placeholder="Type message"><br>
  <input type="file" id="files" multiple><br>

  <button onclick="sendMessage()">📨 Send</button>
  <button onclick="markSeen()">✔✔ Mark Seen</button>

  <div id="typing"></div>
  <div id="chat"></div>

  <script>

    let socket;
    let conversationId;

    const API = "http://localhost:4002/api/chat";
    const renderedMessages = new Set();

    /* ---------------- CONNECT SOCKET ---------------- */

    function connectSocket() {

      socket = io("http://localhost:4002");

      socket.emit("user-online", { userId: myId.value });

      socket.on("user-status", (d) => {
        system(`User ${d.userId} ${d.online ? "ONLINE 🟢" : "OFFLINE ⚪"}`);
      });

      socket.on("receive-message", async ({ messageId }) => {

        if (renderedMessages.has(messageId)) return;

        const msg = await fetchMessage(messageId);

        if (!msg) return;

        renderedMessages.add(messageId);

        const who = msg.sender?.senderId === myId.value ? "me" : "other";

        render(who, msg.content || "[media]", messageId);

      });

      socket.on("message-status", ({ messageId, status }) => {
        updateTick(messageId, status);
      });

      socket.on("typing", ({ userId }) => {
        if (userId !== myId.value) {
          typing.innerText = "Typing...";
        }
      });

      socket.on("stop-typing", () => {
        typing.innerText = "";
      });

      alert("Socket Connected");

    }

    /* ---------------- CREATE CONVERSATION ---------------- */

    async function createConversation() {

      const res = await fetch(`${API}/conversation`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + token.value
        },
        body: JSON.stringify({
          receiverId: otherId.value,
          receiverModel: receiverModel.value
        })
      });

      const data = await res.json();

      conversationId = data._id;

      document.getElementById("conversationId").innerText = conversationId;

      socket.emit("join-conversation", conversationId);

      system("Conversation Ready");

    }

    /* ---------------- SEND MESSAGE ---------------- */

    async function sendMessage() {

      const form = new FormData();

      form.append("conversationId", conversationId);
      form.append("receiverId", otherId.value);
      form.append("receiverModel", receiverModel.value);
      form.append("content", message.value);

      for (let f of files.files) {
        form.append("chatMedia", f);
      }

      const res = await fetch(`${API}/messages`, {
        method: "POST",
        headers: { Authorization: "Bearer " + token.value },
        body: form
      });

      const msg = await res.json();

      renderedMessages.add(msg._id);

      render("me", msg.content || "[media]", msg._id);

      socket.emit("send-message", {
        messageId: msg._id,
        conversationId
      });

      message.value = "";
      files.value = "";

    }

    /* ---------------- FETCH MESSAGE ---------------- */

    async function fetchMessage(messageId) {

      const res = await fetch(`${API}/messages/${conversationId}`, {
        headers: { Authorization: "Bearer " + token.value }
      });

      const msgs = await res.json();

      return msgs.find(m => m._id === messageId);

    }

    /* ---------------- SEEN ---------------- */

    function markSeen() {
      socket.emit("message-seen", { conversationId });
    }

    /* ---------------- TYPING EVENTS ---------------- */

    message.addEventListener("input", () => {
      socket.emit("typing", { conversationId });
    });

    message.addEventListener("blur", () => {
      socket.emit("stop-typing", { conversationId });
    });

    /* ---------------- UI ---------------- */

    function render(who, text, messageId) {

      const div = document.createElement("div");

      div.innerHTML = `<b>${who === "me" ? "Me" : "Other"}:</b> ${text}
  <span class="tick grey" data-id="${messageId}">✔</span>`;

      chat.appendChild(div);

      chat.scrollTop = chat.scrollHeight;

    }

    function updateTick(messageId, status) {

      const tick = document.querySelector(`[data-id="${messageId}"]`);

      if (!tick) return;

      if (status === "delivered") {
        tick.innerText = "✔✔";
        tick.className = "tick grey";
      }

      if (status === "seen") {
        tick.innerText = "✔✔";
        tick.className = "tick blue";
      }

    }

    function system(text) {

      const div = document.createElement("div");

      div.className = "system";

      div.innerText = "SYSTEM: " + text;

      chat.appendChild(div);

    }

  </script>

</body>

</html>
